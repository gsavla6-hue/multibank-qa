# ── Application ──────────────────────────────────────────────────────────────
base.url=https://mb.io/en

# ── Browser ──────────────────────────────────────────────────────────────────
browser=chrome
headless=false

# ── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait.seconds=5
explicit.wait.seconds=15
page.load.timeout.seconds=30

# ── Retry ────────────────────────────────────────────────────────────────────
retry.count=1

# ── Paths ────────────────────────────────────────────────────────────────────
screenshot.dir=target/screenshots
report.dir=target/extent-reports
