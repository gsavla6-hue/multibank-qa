name: MultiBank QA – CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options: [ chrome, firefox, edge ]
      suite:
        description: 'Test suite to execute'
        required: false
        default: 'regression'
        type: choice
        options: [ smoke, regression, cross-browser ]

jobs:
  test:
    name: Run ${{ github.event.inputs.suite || 'regression' }} suite on ${{ github.event.inputs.browser || 'chrome' }}
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ───────────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # ── Browser setup ────────────────────────────────────────────────────────
      - name: Set up Chrome
        if: ${{ github.event.inputs.browser == 'chrome' || github.event.inputs.browser == '' }}
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        if: ${{ github.event.inputs.browser == 'firefox' }}
        uses: browser-actions/setup-firefox@v1

      # ── Run Tests ─────────────────────────────────────────────────────────────
      - name: Run test suite
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
          SUITE:   ${{ github.event.inputs.suite   || 'regression' }}
        run: |
          mvn test \
            -P${SUITE} \
            -Dbrowser=${BROWSER} \
            -Dheadless=true \
            --no-transfer-progress

      # ── Upload Allure results ─────────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          retention-days: 30

      # ── Upload ExtentReports HTML ─────────────────────────────────────────────
      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: target/extent-reports
          retention-days: 30

      # ── Upload screenshots on failure ─────────────────────────────────────────
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: target/screenshots
          retention-days: 14

      # ── Upload logs ───────────────────────────────────────────────────────────
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: target/logs
          retention-days: 7

      # ── Publish Allure report to GitHub Pages ────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report --no-transfer-progress || true

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          destination_dir: allure-report/${{ github.run_number }}

  # ── Cross-browser job (runs only on main push or manual trigger) ──────────
  cross-browser:
    name: Cross-browser verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome, firefox ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set up ${{ matrix.browser }}
        uses: browser-actions/setup-${{ matrix.browser }}@v1

      - name: Run smoke suite on ${{ matrix.browser }}
        run: |
          mvn test \
            -Psmoke \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            --no-transfer-progress

      - name: Upload results – ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-${{ matrix.browser }}-${{ github.run_number }}
          path: |
            target/allure-results
            target/screenshots
          retention-days: 14
